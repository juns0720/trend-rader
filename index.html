<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Trend Radar — Prototype</title>

  <!-- Pretendard (Korean+Latin) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net"/>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <style>
    :root {
      --bg:    #faf7f1;
      --bg-2:  #f1ece1;
      --paper: #ffffff;
      --ink:   #1a1814;
      --ink-2: #4a463f;
      --mute:  #8a8478;
      --line:  #e6e0d2;
      --go:    oklch(0.72 0.16 145);
      --soon:  oklch(0.78 0.15 85);
      --late:  oklch(0.65 0.18 25);
      --font-body: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      font-family: var(--font-body);
      color: var(--ink);
      background: #e9e6df;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.005em;
    }
    /* All elements inherit Pretendard */
    button, input, textarea, select { font-family: inherit; color: inherit; letter-spacing: inherit; }
    /* Hide scrollbars where natural (chips strips, etc.) */
    ::-webkit-scrollbar { width: 0; height: 0; }
    /* Keyframes for screen transitions */
    @keyframes tr-slide-in {
      from { transform: translateX(30%); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }
    @keyframes tr-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes tr-pulse {
      0%, 100% { opacity: 1; transform: scale(1);   }
      50%      { opacity: 0.45; transform: scale(0.7); }
    }
    /* Selection */
    ::selection { background: var(--ink); color: var(--paper); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Frames / starter components -->
  <script type="text/babel" src="frames/design-canvas.jsx"></script>
  <script type="text/babel" src="frames/android-frame.jsx"></script>
  <script type="text/babel" src="frames/browser-window.jsx"></script>
  <script type="text/babel" src="frames/tweaks-panel.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/user-app.jsx"></script>
  <script type="text/babel" src="app/admin-console.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
