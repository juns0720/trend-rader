<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>트렌드 레이더 — MVP</title>

  <!-- Fonts: Pretendard / SUIT / Wanted Sans / Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">

  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body,#root{margin:0;padding:0;height:100%;background:#171717;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{overflow:hidden}

    /* Background dot grid behind the phone */
    body::before{
      content:""; position:fixed; inset:0; z-index:0;
      background-image: radial-gradient(rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }

    .tr-icon-btn{
      width:38px;height:38px;border:0;border-radius:100px;background:transparent;
      color:var(--tr-fg);cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .tr-icon-btn:hover{background:var(--tr-card-2)}
    .tr-no-scrollbar::-webkit-scrollbar{display:none}
    .tr-no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    #root *::-webkit-scrollbar{display:none}

    @keyframes tr-pulse {
      0%   { transform: scale(0.9); opacity: 0.4; }
      70%  { transform: scale(1.6); opacity: 0; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes tr-spin { to { transform: rotate(360deg); } }
    @keyframes tr-slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes tr-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes tr-dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes tr-glow-breathe {
      0%, 100% { box-shadow: 0 0 0 3px rgba(200,255,61,0.22), 0 0 10px rgba(200,255,61,0.5); }
      50%       { box-shadow: 0 0 0 5px rgba(200,255,61,0.12), 0 0 22px rgba(200,255,61,0.75); }
    }
    @keyframes tr-vote-rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes tr-vote-fill {
      from { transform: scaleX(0.08); }
      to   { transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js?v=20260520-mobile-clean-header"></script>
  <script type="text/babel" src="tweaks-panel.jsx?v=20260520-mobile-clean-header"></script>
  <script type="text/babel" src="icons.jsx?v=20260520-mobile-clean-header"></script>
  <script type="text/babel" src="user.jsx?v=20260520-mobile-clean-header"></script>
  <script type="text/babel" src="admin.jsx?v=20260520-mobile-clean-header"></script>
  <script type="text/babel" src="app.jsx?v=20260520-mobile-clean-header"></script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#0a0a0a"/>
      <circle cx="100" cy="100" r="56" fill="none" stroke="#C8FF3D" stroke-width="3"/>
      <circle cx="100" cy="100" r="34" fill="none" stroke="#C8FF3D" stroke-width="3" opacity="0.7"/>
      <circle cx="100" cy="100" r="14" fill="none" stroke="#C8FF3D" stroke-width="3" opacity="0.5"/>
      <line x1="100" y1="100" x2="142" y2="58" stroke="#C8FF3D" stroke-width="3" stroke-linecap="round"/>
      <circle cx="142" cy="58" r="5" fill="#C8FF3D"/>
    </svg>
  </template>
</body>
</html>
